<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stream</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── Tokens (light mode) ─────────────────────────────────── */
    :root {
      --bg:           #f5f5f8;
      --bg-raised:    #ffffff;
      --surface:      #ffffff;
      --surface-2:    #f0f0f4;
      --surface-3:    #e8e8ed;
      --border:       #e0e0e9;
      --border-2:     #d0d0db;
      --text:         #111118;
      --text-2:       #6b6b80;
      --text-3:       #a8a8bf;

      --sidebar-bg:   #ececf0;
      --sidebar-border: #e0e0e9;

      --books:        #1d4ed8;
      --india:        #b91c1c;
      --errands:      #a16207;
      --creative:     #15803d;
      --misc:         #6d28d9;

      --blue:         #2563eb;
      --blue-dim:     rgba(37,99,235,.1);

      --shadow-sm:    0 1px 2px rgba(0,0,0,.05);
      --shadow:       0 2px 8px rgba(0,0,0,.08);
      --shadow-lg:    0 8px 24px rgba(0,0,0,.12);

      --sidebar-w:    212px;
      --radius:       10px;
      --radius-sm:    6px;
    }

    /* ── Reset ────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      min-height: 100%;
      -webkit-font-smoothing: antialiased;
    }
    button { font-family: inherit; cursor: pointer; }

    /* ── Layout ──────────────────────────────────────────────── */
    .app { display: flex; min-height: 100vh; }

    /* ── Sidebar ─────────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--sidebar-bg);
      border-right: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow: hidden;
    }

    .sidebar-logo {
      padding: 20px 16px 14px;
      border-bottom: 1px solid var(--sidebar-border);
    }
    .sidebar-logo h1 { font-size: 15px; font-weight: 600; letter-spacing: -.2px; color: var(--text); }
    .sidebar-logo .sub { font-size: 11px; color: var(--text-3); margin-top: 1px; }

    .sidebar-nav { padding: 8px 6px; flex: 1; overflow-y: auto; }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--text-3);
      padding: 6px 10px 4px;
    }

    .nav-item {
      display: flex;
      align-items: center;
      gap: 9px;
      padding: 7px 10px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: background .1s;
      color: var(--text-2);
      font-size: 13px;
    }
    .nav-item:hover { background: rgba(0,0,0,.05); color: var(--text); }
    .nav-item.active { background: rgba(0,0,0,.07); color: var(--text); font-weight: 500; }
    .nav-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .nav-count {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-3);
      background: rgba(0,0,0,.06);
      padding: 1px 6px;
      border-radius: 10px;
      font-variant-numeric: tabular-nums;
    }

    .sidebar-footer {
      padding: 10px 6px 14px;
      border-top: 1px solid var(--sidebar-border);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .footer-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px;
      border-radius: var(--radius-sm);
      border: none;
      background: none;
      color: var(--text-2);
      font-size: 12px;
      transition: background .1s, color .1s;
      width: 100%;
      text-align: left;
    }
    .footer-btn:hover { background: rgba(0,0,0,.05); color: var(--text); }
    .footer-btn.active { background: var(--blue-dim); color: var(--blue); }
    .footer-btn .btn-icon { font-size: 13px; width: 14px; text-align: center; }
    #last-updated-sidebar { font-size: 10px; color: var(--text-3); padding: 2px 10px 6px; }

    /* ── Main ────────────────────────────────────────────────── */
    .main { flex: 1; min-width: 0; padding: 32px 40px 140px; }

    /* ── Processing banner ───────────────────────────────────── */
    #processing-banner {
      display: none;
      align-items: center;
      gap: 10px;
      background: rgba(37,99,235,.07);
      border: 1px solid rgba(37,99,235,.2);
      border-radius: var(--radius);
      padding: 9px 14px;
      margin-bottom: 24px;
      font-size: 12px;
      color: var(--blue);
      overflow: hidden;
      position: relative;
    }
    #processing-banner.visible { display: flex; }
    #processing-banner::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(90deg, transparent 20%, rgba(37,99,235,.06) 50%, transparent 80%);
      animation: shimmer 1.8s infinite;
    }
    @keyframes shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    .processing-dot {
      width: 6px; height: 6px; border-radius: 50%; background: var(--blue);
      animation: pdot 1.4s ease-in-out infinite; flex-shrink: 0;
    }
    @keyframes pdot { 0%,100% { opacity:.35; transform:scale(.85); } 50% { opacity:1; transform:scale(1.1); } }

    /* ── Upcoming timeline ───────────────────────────────────── */
    #upcoming { display: none; margin-bottom: 28px; }
    #upcoming.visible { display: block; }
    .upcoming-label {
      font-size: 10px; font-weight: 600; letter-spacing: .5px;
      text-transform: uppercase; color: var(--text-3); margin-bottom: 10px;
    }
    .upcoming-track { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
    .upcoming-track::-webkit-scrollbar { display: none; }
    .upcoming-chip {
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 12px;
      min-width: 130px;
      max-width: 190px;
      box-shadow: var(--shadow-sm);
    }
    .upcoming-chip-time { font-size: 11px; color: var(--blue); margin-bottom: 2px; font-variant-numeric: tabular-nums; }
    .upcoming-chip-text { font-size: 12px; color: var(--text-2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Section groups ──────────────────────────────────────── */
    .section-group { margin-bottom: 28px; }
    .section-group-header {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 2px; padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    .section-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .section-group-header h2 {
      font-size: 11px; font-weight: 600; letter-spacing: .5px;
      text-transform: uppercase; color: var(--text-3); flex: 1;
    }
    .section-badge { font-size: 11px; color: var(--text-3); font-variant-numeric: tabular-nums; }
    .empty-state { padding: 12px 2px; color: var(--text-3); font-size: 12px; }

    /* ── Brief cards ─────────────────────────────────────────── */
    .brief-badge {
      display: inline-flex; align-items: center; gap: 3px;
      font-size: 10px; font-weight: 500;
      background: var(--blue-dim); color: var(--blue);
      border: 1px solid rgba(37,99,235,.2);
      border-radius: 4px; padding: 1px 6px;
      cursor: pointer; transition: background .1s;
      flex-shrink: 0; white-space: nowrap;
    }
    .brief-badge:hover { background: rgba(37,99,235,.18); }
    .brief-card {
      display: none;
      margin: 4px 0 6px 36px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--blue);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      font-size: 13px;
      box-shadow: var(--shadow-sm);
    }
    .brief-card.open { display: block; }
    .brief-card-title {
      font-weight: 600; font-size: 13px;
      color: var(--text); margin-bottom: 6px;
    }
    .brief-card-summary {
      color: var(--blue); font-size: 12px;
      margin-bottom: 8px; font-style: italic;
    }
    .brief-card-body {
      color: var(--text-2); font-size: 12px; line-height: 1.6;
      white-space: pre-wrap; margin-bottom: 8px;
    }
    .brief-card-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
    .brief-card-link {
      font-size: 11px; color: var(--blue);
      text-decoration: none; background: var(--blue-dim);
      padding: 3px 8px; border-radius: 4px;
      border: 1px solid rgba(37,99,235,.2);
    }
    .brief-card-link:hover { background: rgba(37,99,235,.18); }
    .brief-card-meta { font-size: 10px; color: var(--text-3); margin-top: 8px; }
    .brief-loading { color: var(--text-3); font-size: 12px; font-style: italic; }

    /* ── Item rows ───────────────────────────────────────────── */
    .item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 9px 8px 9px 12px;
      border-radius: var(--radius-sm);
      transition: background .1s;
      position: relative;
      user-select: none;
    }
    .item:hover { background: var(--surface-2); }
    .item.dragging { opacity: .3; }
    .item.drag-over::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 2px; background: var(--blue); border-radius: 2px;
    }

    /* Priority left-bar */
    .item::after {
      content: '';
      position: absolute; left: 2px; top: 8px; bottom: 8px;
      width: 2px; border-radius: 2px; background: transparent;
      transition: background .15s;
    }
    .item[data-priority="high"]::after   { background: var(--india); }
    .item[data-priority="medium"]::after { background: var(--errands); }
    .item[data-priority="low"]::after    { background: var(--creative); }

    /* Drag handle */
    .drag-handle {
      display: none; cursor: grab; color: var(--text-3);
      font-size: 11px; user-select: none; flex-shrink: 0;
      padding-top: 3px; line-height: 1; opacity: 0;
      transition: opacity .1s;
    }
    .drag-handle:active { cursor: grabbing; }
    body.edit-mode .item:hover .drag-handle { opacity: 1; }
    body.edit-mode .drag-handle { display: block; }

    /* Checkbox */
    .item-check {
      display: none;
      width: 15px; height: 15px; flex-shrink: 0;
      margin-top: 3px; accent-color: var(--blue); cursor: pointer;
    }
    body.edit-mode .item-check { display: block; }

    /* Cat dot */
    .item-cat-dot {
      width: 6px; height: 6px; border-radius: 50%;
      flex-shrink: 0; margin-top: 5px;
    }
    body.edit-mode .item-cat-dot { display: none; }

    /* Body */
    .item-body { flex: 1; min-width: 0; }
    .item-text {
      font-size: 13.5px; color: var(--text); line-height: 1.45;
      border-radius: 3px; transition: background .1s;
    }
    .item-text.done { text-decoration: line-through; color: var(--text-3); }
    .item-text[contenteditable="true"] {
      outline: none;
      background: var(--blue-dim);
      padding: 1px 4px;
      border-radius: 3px;
      cursor: text;
    }
    body.edit-mode .item-text { cursor: text; }

    .item-meta { display: flex; align-items: center; gap: 6px; margin-top: 3px; flex-wrap: wrap; }
    .item-time { font-size: 11px; color: var(--text-3); }

    .badge {
      font-size: 10px; font-weight: 500;
      padding: 1px 7px; border-radius: 4px; letter-spacing: .1px;
    }
    .badge.high   { background: rgba(185,28,28,.1);  color: var(--india); }
    .badge.medium { background: rgba(161,98,7,.1);   color: var(--errands); }
    .badge.low    { background: rgba(21,128,61,.1);  color: var(--creative); }

    .reminder-tag {
      font-size: 11px; color: var(--blue);
      background: var(--blue-dim);
      padding: 1px 7px; border-radius: 4px;
    }

    /* Edit action buttons (right side, hover in edit mode) */
    .item-actions {
      display: none;
      gap: 3px;
      flex-shrink: 0;
      align-items: center;
      margin-left: auto;
      padding-left: 6px;
    }
    body.edit-mode .item:hover .item-actions { display: flex; }

    .act-btn {
      display: flex; align-items: center; justify-content: center;
      height: 24px; padding: 0 7px;
      border-radius: 4px; border: 1px solid var(--border-2);
      background: var(--surface); color: var(--text-2);
      font-size: 11px; font-weight: 500;
      transition: background .1s, border-color .1s, color .1s;
      white-space: nowrap;
    }
    .act-btn:hover { background: var(--surface-3); border-color: var(--border-2); color: var(--text); }
    .act-btn.act-priority { gap: 4px; }
    .act-btn .act-dot { width: 5px; height: 5px; border-radius: 50%; }
    .act-btn.act-archive:hover { background: rgba(185,28,28,.07); border-color: rgba(185,28,28,.25); color: var(--india); }

    /* ── Popovers ─────────────────────────────────────────────── */
    .popover {
      position: fixed;
      z-index: 300;
      background: var(--surface);
      border: 1px solid var(--border-2);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      padding: 8px;
      animation: popIn .12s ease-out;
    }
    @keyframes popIn { from { opacity:0; transform:scale(.95) translateY(-4px); } to { opacity:1; transform:scale(1) translateY(0); } }

    /* Priority picker */
    .picker-priority { display: flex; gap: 4px; }
    .pick-pill {
      padding: 4px 12px; border-radius: 5px;
      border: 1px solid var(--border);
      background: none; font-size: 12px; font-weight: 500;
      color: var(--text-2); transition: all .1s;
    }
    .pick-pill:hover { border-color: var(--border-2); color: var(--text); background: var(--surface-2); }
    .pick-pill.sel-high   { background: rgba(185,28,28,.1);  border-color: rgba(185,28,28,.3);  color: var(--india); }
    .pick-pill.sel-medium { background: rgba(161,98,7,.1);   border-color: rgba(161,98,7,.3);   color: var(--errands); }
    .pick-pill.sel-low    { background: rgba(21,128,61,.1);  border-color: rgba(21,128,61,.3);  color: var(--creative); }
    .pick-pill.pick-none  { color: var(--text-3); font-size: 11px; }

    /* Reminder picker */
    .picker-reminder { width: 260px; display: flex; flex-direction: column; gap: 8px; }
    .reminder-input {
      width: 100%; padding: 7px 10px;
      background: var(--surface-2); border: 1px solid var(--border-2);
      border-radius: var(--radius-sm); font-family: inherit;
      font-size: 13px; color: var(--text); outline: none;
    }
    .reminder-input:focus { border-color: var(--blue); background: #fff; }
    .quick-picks { display: flex; flex-wrap: wrap; gap: 4px; }
    .quick-pick {
      font-size: 11px; padding: 3px 8px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 4px; color: var(--text-2);
      transition: all .1s;
    }
    .quick-pick:hover { background: var(--blue-dim); border-color: rgba(37,99,235,.3); color: var(--blue); }
    .picker-footer { display: flex; justify-content: space-between; align-items: center; gap: 6px; padding-top: 2px; }
    .pick-remove { font-size: 11px; background: none; border: none; color: var(--text-3); padding: 0; }
    .pick-remove:hover { color: var(--india); }
    .pick-confirm {
      margin-left: auto;
      padding: 5px 12px; border-radius: 5px;
      background: var(--blue); border: none;
      color: #fff; font-size: 12px; font-weight: 500;
    }
    .pick-confirm:hover { filter: brightness(1.1); }

    /* ── Skeleton ─────────────────────────────────────────────── */
    .skeleton-group { margin-bottom: 28px; }
    .skeleton-hdr { height: 10px; width: 70px; background: var(--surface-3); border-radius: 4px; margin-bottom: 14px; animation: sk 1.6s ease-in-out infinite; }
    .skeleton-row { height: 36px; background: var(--surface-3); border-radius: var(--radius-sm); margin-bottom: 3px; animation: sk 1.6s ease-in-out infinite; }
    .skeleton-row:nth-child(2) { width: 82%; animation-delay: .1s; }
    .skeleton-row:nth-child(3) { width: 65%; animation-delay: .2s; }
    @keyframes sk { 0%,100% { opacity:.4; } 50% { opacity:.7; } }

    /* ── Edit drawer ─────────────────────────────────────────── */
    #edit-drawer {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--surface);
      border-top: 1px solid var(--border-2);
      box-shadow: 0 -4px 24px rgba(0,0,0,.08);
      padding: 14px 24px 18px;
      z-index: 200;
      display: flex; align-items: flex-start; gap: 20px;
      transform: translateY(100%);
      transition: transform .22s cubic-bezier(.25,.46,.45,.94);
    }
    body.edit-mode #edit-drawer { transform: translateY(0); }

    .drawer-left { flex: 1; min-width: 0; }
    .drawer-label {
      font-size: 10px; font-weight: 600; letter-spacing: .5px;
      text-transform: uppercase; color: var(--blue); margin-bottom: 8px;
    }
    #changes-list { display: flex; flex-direction: column; gap: 4px; }
    .change-chip {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface-2); border: 1px solid var(--border);
      border-radius: 5px; padding: 5px 8px;
      font-size: 12px; color: var(--text-2);
      animation: chipIn .15s ease-out;
    }
    @keyframes chipIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
    .change-chip span { color: var(--text); font-weight: 500; }
    .change-undo {
      margin-left: auto; flex-shrink: 0;
      background: none; border: none; color: var(--text-3);
      font-size: 13px; padding: 0 2px; line-height: 1;
      transition: color .1s;
    }
    .change-undo:hover { color: var(--india); }
    #changes-empty { font-size: 12px; color: var(--text-3); font-style: italic; padding: 2px 0; }

    .drawer-actions { display: flex; flex-direction: column; gap: 6px; min-width: 148px; }
    .drawer-btn {
      padding: 8px 14px; border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 500;
      border: none; text-align: center;
      transition: filter .12s;
    }
    .drawer-btn:hover { filter: brightness(.95); }
    .drawer-btn.primary   { background: #dcfce7; color: #15803d; }
    .drawer-btn.secondary { background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border-2); }

    /* ── WhatsApp sheet ───────────────────────────────────────── */
    #wa-sheet {
      position: fixed; inset: 0; z-index: 400;
      display: flex; align-items: flex-end;
      pointer-events: none;
    }
    #wa-sheet.open { pointer-events: all; }
    .wa-backdrop {
      position: absolute; inset: 0;
      background: rgba(0,0,0,.35);
      opacity: 0; transition: opacity .22s;
      backdrop-filter: blur(2px);
    }
    #wa-sheet.open .wa-backdrop { opacity: 1; }
    .wa-panel {
      position: relative;
      background: var(--surface);
      border-top: 1px solid var(--border-2);
      border-radius: 16px 16px 0 0;
      box-shadow: var(--shadow-lg);
      padding: 18px 24px 28px;
      width: 100%; max-width: 520px; margin: 0 auto;
      transform: translateY(100%);
      transition: transform .25s cubic-bezier(.25,.46,.45,.94);
    }
    #wa-sheet.open .wa-panel { transform: translateY(0); }
    .wa-handle { width: 36px; height: 4px; background: var(--border-2); border-radius: 2px; margin: 0 auto 16px; }
    .wa-panel h3 { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .wa-panel p  { font-size: 12px; color: var(--text-2); margin-bottom: 10px; }
    #wa-text {
      width: 100%;
      background: var(--surface-2); border: 1px solid var(--border-2);
      border-radius: var(--radius-sm); color: var(--text);
      font-family: 'SF Mono', 'Menlo', monospace; font-size: 12px;
      padding: 10px 12px; resize: vertical; min-height: 90px; outline: none;
    }
    #wa-text:focus { border-color: var(--blue); }
    .wa-actions { display: flex; gap: 8px; margin-top: 10px; justify-content: flex-end; align-items: center; }
    #copy-confirm { font-size: 11px; color: var(--creative); margin-right: auto; display: none; }
    .wa-btn {
      padding: 7px 16px; border-radius: var(--radius-sm);
      font-size: 12px; font-weight: 500; border: none;
    }
    .wa-btn.copy   { background: var(--blue); color: #fff; }
    .wa-btn.cancel { background: var(--surface-2); color: var(--text-2); border: 1px solid var(--border-2); }

    /* ── Archive ─────────────────────────────────────────────── */
    .archive-section { margin-top: 8px; }
    .archive-toggle {
      background: none; border: none; color: var(--text-3);
      font-size: 12px; display: flex; align-items: center;
      gap: 6px; padding: 4px 0; margin-bottom: 14px;
      transition: color .12s;
    }
    .archive-toggle:hover { color: var(--text-2); }
    .archive-arrow { transition: transform .18s; display: inline-block; }
    .archive-arrow.open { transform: rotate(90deg); }
    .archive-content { display: none; }
    .archive-content.open { display: block; }
    .archive-content .section-group { opacity: .45; }

    /* ── OS dark mode ────────────────────────────────────────── */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg:           #0c0c0e;
        --bg-raised:    #141416;
        --surface:      #1a1a1d;
        --surface-2:    #222226;
        --surface-3:    #2a2a2f;
        --border:       #2e2e38;
        --border-2:     #3a3a46;
        --text:         #f0f0f2;
        --text-2:       #8585a0;
        --text-3:       #48485e;
        --sidebar-bg:   #111114;

<body>

    </div>

<script>
const CSV_URL    = 'https://raw.githubusercontent.com/chillibyte/stream-todo/main/todos.csv';
const BRIEFS_URL = 'https://raw.githubusercontent.com/chillibyte/stream-todo/main/';
const PAGES_URL  = 'https://chillibyte.github.io/stream-todo/';

const briefCache = {}; // id → brief JSON (or 'loading' / 'error')

// Known categories with fixed brand colours (defined order)
const KNOWN_CATEGORIES = {
  'errands':   { label: 'Errands',     color: 'var(--errands)'  },
  'books':     { label: 'Books',       color: 'var(--books)'    },
  'india-rci': { label: 'India / RCI', color: 'var(--india)'    },
  'creative':  { label: 'Creative',    color: 'var(--creative)' },
  'misc':      { label: 'Misc',        color: 'var(--misc)'     },
};
const KNOWN_ORDER = ['errands', 'books', 'india-rci', 'creative', 'misc'];

// Dynamic CATEGORIES — rebuilt from CSV on every load
let CATEGORIES = Object.entries(KNOWN_CATEGORIES).map(([key, v]) => ({ key, ...v }));

function catColorFromHash(key) {
  let hash = 5381;
  for (let i = 0; i < key.length; i++) hash = (hash * 33) ^ key.charCodeAt(i);
  const hue = Math.abs(hash) % 360;
  return `hsl(${hue}, 50%, 42%)`;
}

function buildCategories(rows) {
  const seen = new Set(rows.map(r => r.category || 'misc').filter(Boolean));
  // Known categories first, in defined order, only if present in data
  const known = KNOWN_ORDER
    .filter(k => seen.has(k))
    .map(k => ({ key: k, ...KNOWN_CATEGORIES[k] }));
  // Unknown categories — sorted alphabetically, colour from hash
  const unknown = [...seen]
    .filter(k => !KNOWN_CATEGORIES[k])
    .sort()
    .map(k => ({ key: k, label: k.charAt(0).toUpperCase() + k.slice(1).replace(/-/g, ' '), color: catColorFromHash(k) }));
  // Always include misc as a fallback even if empty
  CATEGORIES = [...known, ...unknown];
  if (!CATEGORIES.find(c => c.key === 'misc')) {
    CATEGORIES.push({ key: 'misc', ...KNOWN_CATEGORIES['misc'] });
  }
  return CATEGORIES;
}

function renderSidebar(cats) {
  document.getElementById('cat-nav').innerHTML = `
    <div class="nav-item ${activeCat === 'all' ? 'active' : ''}" data-cat="all" onclick="filterCat('all',this)">
      <span class="nav-dot" style="background:var(--text-3)"></span>
      All
      <span class="nav-count" id="count-all">–</span>
    </div>
    ${cats.map(c => `
      <div class="nav-item ${activeCat === c.key ? 'active' : ''}" data-cat="${c.key}" onclick="filterCat('${c.key}',this)">
        <span class="nav-dot" style="background:${c.color}"></span>
        ${esc(c.label)}
        <span class="nav-count" id="count-${c.key}">–</span>
      </div>`).join('')}
  `;
}

const PRIORITY_COLORS = { high: 'var(--india)', medium: 'var(--errands)', low: 'var(--creative)' };
const PRIORITY_LABELS = { high: 'H', medium: 'M', low: 'L' };

let allRows   = [];
let changes   = [];
let dragSrcId = null;
let activeCat = 'all';
let activePicker = null;

// ── CSV ───────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split(/\r?\n/);
  function parseLine(line) {
    const fields = []; let i = 0;
    while (i < line.length) {
      if (line[i] === '"') {
        let f = ''; i++;
        while (i < line.length) {
          if (line[i] === '"' && line[i+1] === '"') { f += '"'; i += 2; }
          else if (line[i] === '"') { i++; break; }
          else f += line[i++];
        }
        fields.push(f);
        if (line[i] === ',') i++;
      } else {
        const end = line.indexOf(',', i);
        if (end === -1) { fields.push(line.slice(i).trim()); break; }
        else { fields.push(line.slice(i, end).trim()); i = end + 1; }
      }
    }
    return fields;
  }
  const headers = parseLine(lines[0]);
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = parseLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  });
}

function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Time ─────────────────────────────────────────────────────
function fmt(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function fmtFull(iso) {
  if (!iso) return '';
  const d = new Date(iso), today = new Date();
  if (d.toDateString() === today.toDateString()) return 'today ' + fmt(iso);
  const tom = new Date(today); tom.setDate(today.getDate() + 1);
  if (d.toDateString() === tom.toDateString()) return 'tomorrow ' + fmt(iso);
  return d.toLocaleDateString([], { day: 'numeric', month: 'short' }) + ' ' + fmt(iso);
}
function fmtAge(iso) {
  if (!iso) return '';
  const mins = Math.floor((Date.now() - new Date(iso)) / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  return Math.floor(hrs / 24) + 'd ago';
}
function within48h(iso) {
  return iso && (Date.now() - new Date(iso).getTime()) < 48 * 3600 * 1000;
}

// ── Changes ───────────────────────────────────────────────────
function recordChange(type, id, label, from, to) {
  // If it's a revert to original, remove the change
  const existing = changes.find(c => c.id === id && c.type === type);
  if (existing && existing.from === to) {
    changes = changes.filter(c => !(c.id === id && c.type === type));
  } else {
    changes = changes.filter(c => !(c.id === id && c.type === type));
    changes.push({ type, id, label, from, to });
  }
  renderChanges();
}

function undoChange(id, type) {
  changes = changes.filter(c => !(c.id === id && c.type === type));
  renderChanges();
  // Re-render the item to reflect reverted state
  rebuildItem(id);
}

function renderChanges() {
  const list = document.getElementById('changes-list');
  if (!changes.length) {
    list.innerHTML = '<span id="changes-empty">No changes yet — click items to edit, check off, or use the action buttons.</span>';
    return;
  }
  list.innerHTML = '';
  changes.forEach(c => {
    let desc = '';
    if (c.type === 'complete')   desc = `Mark done: <span>${esc(c.label)}</span>`;
    if (c.type === 'uncomplete') desc = `Reopen: <span>${esc(c.label)}</span>`;
    if (c.type === 'priority')   desc = c.to ? `Priority → <span>${c.to}</span>: ${esc(c.label)}` : `Remove priority: <span>${esc(c.label)}</span>`;
    if (c.type === 'reminder')   desc = c.to === 'remove' ? `Remove reminder: <span>${esc(c.label)}</span>` : `Reminder → <span>${c.to}</span>: ${esc(c.label)}`;
    if (c.type === 'reorder')    desc = `Move <span>${esc(c.label)}</span> ${c.to}`;
    if (c.type === 'text')       desc = `Rename: <span>${esc(c.from)}</span> → <span>${esc(c.to)}</span>`;
    if (c.type === 'archive')    desc = `Archive: <span>${esc(c.label)}</span>`;
    const chip = document.createElement('div');
    chip.className = 'change-chip';
    chip.innerHTML = `<span style="color:var(--text-2)">${desc}</span><button class="change-undo" title="Undo">×</button>`;
    chip.querySelector('.change-undo').addEventListener('click', () => undoChange(c.id, c.type));
    list.appendChild(chip);
  });
}

// Rebuild a single item after undo (refresh its visual state from allRows)
function rebuildItem(id) {
  const item = allRows.find(r => r.id === id);
  if (!item) return;
  const existing = document.querySelector(`.item-wrap[data-id="${id}"]`) ||
                   document.querySelector(`.item[data-id="${id}"]`);
  if (!existing) return;
  const newEl = buildItem(item);
  existing.replaceWith(newEl);
}

// ── Popovers ──────────────────────────────────────────────────
function closePicker() {
  if (activePicker) { activePicker.remove(); activePicker = null; }
}

function positionPopover(el, anchor) {
  document.body.appendChild(el);
  activePicker = el;
  const r = anchor.getBoundingClientRect();
  el.style.top  = (r.bottom + 6) + 'px';
  el.style.left = r.left + 'px';
  // Clamp right
  requestAnimationFrame(() => {
    const er = el.getBoundingClientRect();
    if (er.right > window.innerWidth - 8) {
      el.style.left = (r.right - er.width) + 'px';
    }
    if (er.bottom > window.innerHeight - 8) {
      el.style.top = (r.top - er.height - 6) + 'px';
    }
  });
}

function showPriorityPicker(anchor, id, label, current) {
  closePicker();
  const p = document.createElement('div');
  p.className = 'popover picker-priority';
  const opts = [
    { v: 'high',   lbl: 'High',   cls: 'sel-high'   },
    { v: 'medium', lbl: 'Medium', cls: 'sel-medium'  },
    { v: 'low',    lbl: 'Low',    cls: 'sel-low'     },
    { v: '',       lbl: 'None',   cls: 'pick-none'   },
  ];
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'pick-pill' + (current === o.v ? ' ' + o.cls : '');
    btn.textContent = o.lbl;
    btn.addEventListener('click', e => {
      e.stopPropagation();
      if (o.v !== current) recordChange('priority', id, label, current, o.v);
      // Update item's data-priority and left bar
      const itemEl = document.querySelector(`.item[data-id="${id}"]`);
      if (itemEl) {
        itemEl.dataset.priority = o.v;
        // Update badge
        const badge = itemEl.querySelector('.badge');
        if (badge && o.v) {
          badge.className = `badge ${o.v}`;
          badge.textContent = o.v;
        } else if (badge && !o.v) {
          badge.remove();
        }
        // Update action button
        updatePriorityBtn(itemEl, id, label, o.v);
      }
      closePicker();
    });
    p.appendChild(btn);
  });
  positionPopover(p, anchor);
  setTimeout(() => document.addEventListener('click', closePicker, { once: true }), 10);
}

function updatePriorityBtn(itemEl, id, label, priority) {
  const btn = itemEl.querySelector('.act-priority');
  if (!btn) return;
  btn.innerHTML = priority
    ? `<span class="act-dot" style="background:${PRIORITY_COLORS[priority]}"></span>${priority}`
    : 'Priority';
  btn.onclick = (e) => { e.stopPropagation(); showPriorityPicker(btn, id, label, priority); };
}

function showReminderPicker(anchor, id, label, current) {
  closePicker();
  const p = document.createElement('div');
  p.className = 'popover picker-reminder';

  const quickOpts = [
    '5:20pm today',
    'tonight 8pm',
    'tomorrow 9am',
    '12:30pm today',
    'Saturday 10am',
  ];

  p.innerHTML = `
    <input type="text" class="reminder-input" placeholder="e.g. tomorrow 9am, Friday 3pm…" value="${current ? fmtFull(current) : ''}">
    <div class="quick-picks">${quickOpts.map(o => `<button class="quick-pick">${o}</button>`).join('')}</div>
    <div class="picker-footer">
      ${current ? '<button class="pick-remove">Remove reminder</button>' : '<span></span>'}
      <button class="pick-confirm">Set reminder</button>
    </div>`;

  const input = p.querySelector('.reminder-input');

  p.querySelectorAll('.quick-pick').forEach(btn => {
    btn.addEventListener('click', e => { e.stopPropagation(); input.value = btn.textContent; input.focus(); });
  });

  p.querySelector('.pick-confirm').addEventListener('click', e => {
    e.stopPropagation();
    const val = input.value.trim();
    if (val) {
      recordChange('reminder', id, label, current, val);
      // Update reminder tag
      const itemEl = document.querySelector(`.item[data-id="${id}"]`);
      if (itemEl) {
        let tag = itemEl.querySelector('.reminder-tag');
        if (!tag) {
          tag = document.createElement('span');
          tag.className = 'reminder-tag';
          itemEl.querySelector('.item-meta').appendChild(tag);
        }
        tag.textContent = '⏰ ' + val;
      }
    }
    closePicker();
  });

  const removeBtn = p.querySelector('.pick-remove');
  if (removeBtn) {
    removeBtn.addEventListener('click', e => {
      e.stopPropagation();
      recordChange('reminder', id, label, current, 'remove');
      const itemEl = document.querySelector(`.item[data-id="${id}"]`);
      if (itemEl) itemEl.querySelector('.reminder-tag')?.remove();
      closePicker();
    });
  }

  positionPopover(p, anchor);
  input.focus();
  setTimeout(() => {
    document.addEventListener('click', e => {
      if (!p.contains(e.target)) closePicker();
    }, { once: true });
  }, 10);
}

// ── WhatsApp ──────────────────────────────────────────────────
function buildWAMessage() {
  if (!changes.length) return '(no changes)';
  const lines = ['UPDATES'];
  changes.forEach(c => {
    if (c.type === 'complete')   lines.push(`- mark done: ${c.label}`);
    if (c.type === 'uncomplete') lines.push(`- reopen: ${c.label}`);
    if (c.type === 'priority')   lines.push(c.to ? `- priority ${c.to}: ${c.label}` : `- remove priority: ${c.label}`);
    if (c.type === 'reminder')   lines.push(c.to === 'remove' ? `- remove reminder: ${c.label}` : `- remind me about "${c.label}" at ${c.to}`);
    if (c.type === 'reorder')    lines.push(`- move "${c.label}" ${c.to}`);
    if (c.type === 'text')       lines.push(`- rename "${c.from}" to "${c.to}"`);
    if (c.type === 'archive')    lines.push(`- archive: ${c.label}`);
  });
  return lines.join('\n');
}
function openWASheet() {
  document.getElementById('wa-text').value = buildWAMessage();
  document.getElementById('copy-confirm').style.display = 'none';
  document.getElementById('wa-sheet').classList.add('open');
}
function closeWASheet() { document.getElementById('wa-sheet').classList.remove('open'); }
function copyWA() {
  navigator.clipboard.writeText(document.getElementById('wa-text').value).then(() => {
    const c = document.getElementById('copy-confirm');
    c.style.display = 'block';
    setTimeout(() => c.style.display = 'none', 2500);
  });
}

// ── Edit mode ─────────────────────────────────────────────────
function toggleEditMode() {
  closePicker();
  const on = document.body.classList.toggle('edit-mode');
  const btn = document.getElementById('edit-btn');
  btn.classList.toggle('active', on);
  document.getElementById('edit-btn-label').textContent = on ? 'Exit editing' : 'Edit mode';
  document.getElementById('edit-btn').querySelector('.btn-icon').textContent = on ? '✕' : '✦';
  if (!on) { changes = []; renderChanges(); }
}

// Esc to exit edit mode
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (activePicker) { closePicker(); return; }
    if (document.body.classList.contains('edit-mode')) toggleEditMode();
  }
});

// ── Sidebar filter ─────────────────────────────────────────────
function filterCat(cat, el) {
  activeCat = cat;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  el.classList.add('active');
  renderGroups();
}

// ── Build item ────────────────────────────────────────────────
function buildItem(item) {
  const isDone     = item.completed === 'true';
  const reminder   = item.reminder_at;
  const isUpcoming = reminder && new Date(reminder) > new Date() && !isDone;
  const cat        = CATEGORIES.find(c => c.key === item.category);
  const priority   = item.priority || '';
  const hasBrief   = !!item.brief_file;

  const wrap = document.createElement('div');
  wrap.className = 'item-wrap';
  wrap.dataset.id = item.id;

  const div = document.createElement('div');
  div.className = 'item';
  div.dataset.id       = item.id;
  div.dataset.priority = priority;
  div.draggable = false;

  // Priority action button label
  const priorityBtnHTML = priority
    ? `<span class="act-dot" style="background:${PRIORITY_COLORS[priority]}"></span>${priority}`
    : 'Priority';

  div.innerHTML = `
    <span class="drag-handle">⠿</span>
    <input type="checkbox" class="item-check" ${isDone ? 'checked' : ''} />
    <div class="item-cat-dot" style="background:${cat ? cat.color : 'var(--misc)'}"></div>
    <div class="item-body">
      <div class="item-text${isDone ? ' done' : ''}">${esc(item.raw_message)}</div>
      <div class="item-meta">
        <span class="item-time">${fmtAge(item.timestamp)}</span>
        ${priority ? `<span class="badge ${priority}">${priority}</span>` : ''}
        ${isUpcoming ? `<span class="reminder-tag">⏰ ${fmtFull(reminder)}</span>` : ''}
        ${hasBrief ? `<button class="brief-badge" data-id="${item.id}" data-file="${esc(item.brief_file)}">📋 Brief</button>` : ''}
      </div>
    </div>
    <div class="item-actions">
      <button class="act-btn act-priority" title="Set priority">${priorityBtnHTML}</button>
      <button class="act-btn act-reminder" title="Set reminder">⏰</button>
      <button class="act-btn act-archive"  title="Archive">Archive</button>
    </div>`;

  // Brief card slot (hidden until toggled)
  const briefCard = document.createElement('div');
  briefCard.className = 'brief-card';
  briefCard.id = `brief-${item.id}`;

  wrap.appendChild(div);
  if (hasBrief) wrap.appendChild(briefCard);

  // ── Checkbox ──
  div.querySelector('.item-check').addEventListener('change', e => {
    const txt = div.querySelector('.item-text');
    txt.classList.toggle('done', e.target.checked);
    recordChange(e.target.checked ? 'complete' : 'uncomplete', item.id, item.raw_message, null, null);
  });

  // ── Inline text edit ──
  const textEl = div.querySelector('.item-text');
  textEl.addEventListener('click', () => {
    if (!document.body.classList.contains('edit-mode')) return;
    if (textEl.contentEditable === 'true') return;
    textEl.contentEditable = 'true';
    textEl.focus();
    // Select all text
    const range = document.createRange();
    range.selectNodeContents(textEl);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  });
  textEl.addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); textEl.blur(); }
    if (e.key === 'Escape') { textEl.textContent = item.raw_message; textEl.blur(); }
  });
  textEl.addEventListener('blur', () => {
    if (textEl.contentEditable !== 'true') return;
    textEl.contentEditable = 'false';
    const newText = textEl.textContent.trim();
    if (newText && newText !== item.raw_message) {
      recordChange('text', item.id, item.raw_message, item.raw_message, newText);
    } else {
      textEl.textContent = item.raw_message; // reset if empty or unchanged
    }
  });

  // ── Action buttons ──
  const priBtn = div.querySelector('.act-priority');
  priBtn.addEventListener('click', e => {
    e.stopPropagation();
    showPriorityPicker(priBtn, item.id, item.raw_message, priority);
  });

  div.querySelector('.act-reminder').addEventListener('click', e => {
    e.stopPropagation();
    showReminderPicker(div.querySelector('.act-reminder'), item.id, item.raw_message, reminder || null);
  });

  div.querySelector('.act-archive').addEventListener('click', e => {
    e.stopPropagation();
    recordChange('archive', item.id, item.raw_message, null, null);
    div.style.transition = 'opacity .2s, transform .2s';
    div.style.opacity = '0';
    div.style.transform = 'translateX(8px)';
    setTimeout(() => div.remove(), 220);
  });

  // ── Drag ──
  div.addEventListener('dragstart', e => {
    dragSrcId = item.id;
    div.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  });
  div.addEventListener('dragend', () => div.classList.remove('dragging'));
  div.addEventListener('dragover', e => {
    if (!document.body.classList.contains('edit-mode')) return;
    e.preventDefault(); div.classList.add('drag-over');
  });
  div.addEventListener('dragleave', () => div.classList.remove('drag-over'));
  div.addEventListener('drop', e => {
    e.preventDefault(); div.classList.remove('drag-over');
    if (dragSrcId && dragSrcId !== item.id) {
      const src = allRows.find(r => r.id === dragSrcId);
      if (src) recordChange('reorder', dragSrcId, src.raw_message, null, `above "${item.raw_message}"`);
    }
  });

  new MutationObserver(() => {
    div.draggable = document.body.classList.contains('edit-mode');
  }).observe(document.body, { attributes: true, attributeFilter: ['class'] });

  // Brief badge toggle
  if (hasBrief) {
    div.querySelector('.brief-badge').addEventListener('click', e => {
      e.stopPropagation();
      toggleBriefCard(item.id, item.brief_file, briefCard);
    });
  }

  return wrap;
}

// ── Brief cards ───────────────────────────────────────────────

function renderBriefCard(el, brief) {
  const links = (brief.links || []).map(l =>
    `<a class="brief-card-link" href="${esc(l.url)}" target="_blank" rel="noopener">${esc(l.label)}</a>`
  ).join('');
  el.innerHTML = `
    <div class="brief-card-title">${esc(brief.title || '')}</div>
    ${brief.summary ? `<div class="brief-card-summary">${esc(brief.summary)}</div>` : ''}
    ${brief.body    ? `<div class="brief-card-body">${esc(brief.body)}</div>` : ''}
    ${links ? `<div class="brief-card-links">${links}</div>` : ''}
    <div class="brief-card-meta">Brief · ${brief.created_at ? new Date(brief.created_at).toLocaleDateString([], { day:'numeric', month:'short', year:'numeric' }) : ''}</div>
  `;
}

async function toggleBriefCard(id, file, el) {
  if (el.classList.contains('open')) {
    el.classList.remove('open');
    return;
  }
  el.classList.add('open');
  if (briefCache[id] && briefCache[id] !== 'loading') {
    renderBriefCard(el, briefCache[id]);
    return;
  }
  el.innerHTML = '<div class="brief-loading">Loading brief…</div>';
  try {
    const res = await fetch(BRIEFS_URL + file + '?t=' + Date.now());
    if (!res.ok) throw new Error(res.status);
    const brief = await res.json();
    briefCache[id] = brief;
    if (el.classList.contains('open')) renderBriefCard(el, brief);
  } catch (e) {
    briefCache[id] = 'error';
    el.innerHTML = `<div class="brief-loading">Could not load brief — ${e.message}</div>`;
  }
}

function openBriefById(id) {
  // Wait for render then open
  const attempt = () => {
    const card = document.getElementById(`brief-${id}`);
    const wrap = document.querySelector(`.item-wrap[data-id="${id}"]`);
    if (card && wrap) {
      card.scrollIntoView({ behavior: 'smooth', block: 'center' });
      const item = allRows.find(r => r.id === id);
      if (item?.brief_file) toggleBriefCard(id, item.brief_file, card);
    } else {
      setTimeout(attempt, 300);
    }
  };
  attempt();
}

// Hash routing — #brief-{id}
function handleHash() {
  const m = location.hash.match(/^#brief-(\d+)$/);
  if (m) openBriefById(m[1]);
}
window.addEventListener('hashchange', handleHash);

// ── Section group ─────────────────────────────────────────────
function buildGroup(cat, items) {
  const wrap = document.createElement('div');
  wrap.className = 'section-group';
  wrap.dataset.cat = cat.key;

  wrap.innerHTML = `
    <div class="section-group-header">
      <div class="section-dot" style="background:${cat.color}"></div>
      <h2>${cat.label}</h2>
      <span class="section-badge">${items.length}</span>
    </div>`;

  if (!items.length) {
    const e = document.createElement('div');
    e.className = 'empty-state';
    e.textContent = 'Nothing here';
    wrap.appendChild(e);
  } else {
    items.forEach(item => wrap.appendChild(buildItem(item)));
  }
  return wrap;
}

// ── Upcoming ──────────────────────────────────────────────────
function renderUpcoming(rows) {
  const now = new Date();
  const ups = rows
    .filter(r => r.reminder_at && new Date(r.reminder_at) > now && r.completed !== 'true')
    .sort((a, b) => new Date(a.reminder_at) - new Date(b.reminder_at))
    .slice(0, 8);
  const el = document.getElementById('upcoming');
  if (!ups.length) { el.className = ''; return; }
  el.className = 'visible';
  el.innerHTML = `<div class="upcoming-label">Upcoming</div>
    <div class="upcoming-track">${ups.map(r => `
      <div class="upcoming-chip">
        <div class="upcoming-chip-time">${fmtFull(r.reminder_at)}</div>
        <div class="upcoming-chip-text">${esc(r.raw_message)}</div>
      </div>`).join('')}
    </div>`;
}

// ── Render groups ─────────────────────────────────────────────
function renderGroups() {
  const active = allRows.filter(r =>
    r.archived !== 'true' &&
    !(r.completed === 'true' && !within48h(r.completed_at))
  );
  const archive = allRows.filter(r =>
    r.archived === 'true' ||
    (r.completed === 'true' && !within48h(r.completed_at))
  );

  // Sidebar counts
  document.getElementById('count-all').textContent = active.length;
  CATEGORIES.forEach(c => {
    const el = document.getElementById(`count-${c.key}`);
    if (el) el.textContent = active.filter(r => (r.category||'misc') === c.key).length;
  });

  const activeEl  = document.getElementById('active-groups');
  const archiveEl = document.getElementById('archive-content');
  activeEl.innerHTML  = '';
  archiveEl.innerHTML = '';

  const catsToShow = activeCat === 'all'
    ? CATEGORIES
    : CATEGORIES.filter(c => c.key === activeCat);

  catsToShow.forEach(cat => {
    const items = active.filter(r => (r.category||'misc') === cat.key);
    if (activeCat !== 'all' || items.length > 0) {
      activeEl.appendChild(buildGroup(cat, items));
    }
  });

  document.getElementById('archive-count').textContent = archive.length;
  CATEGORIES.forEach(cat => {
    const items = archive.filter(r => (r.category||'misc') === cat.key);
    if (items.length > 0) archiveEl.appendChild(buildGroup(cat, items));
  });

  document.getElementById('processing-banner').classList.toggle('visible', allRows.some(r => r.new === 'true'));
}

// ── Load ──────────────────────────────────────────────────────
function load() {
  fetch(CSV_URL + '?t=' + Date.now())
    .then(r => { if (!r.ok) throw new Error(r.status); return r.text(); })
    .then(text => {
      allRows = parseCSV(text);
      buildCategories(allRows);
      renderSidebar(CATEGORIES);
      renderUpcoming(allRows);
      renderGroups();
      document.getElementById('last-updated-sidebar').textContent =
        'Updated ' + new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      document.getElementById('status').style.display = 'none';
      document.getElementById('main-content').style.display = 'block';
      handleHash();
    })
    .catch(err => {
      document.getElementById('status').innerHTML =
        `<div style="color:var(--text-3);padding:20px 0;font-size:12px">Could not load — ${err.message}</div>`;
    });
}

function toggleArchive() {
  const content = document.getElementById('archive-content');
  const arrow   = document.getElementById('archive-arrow');
  const open = content.classList.toggle('open');
  arrow.classList.toggle('open', open);
}

load();
setInterval(load, 2 * 60 * 1000);
</script>
